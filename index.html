<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=941, initial-scale=1.0">
<title>荒野行動 ギフト妨害オーバーレイ</title>

<!-- フォント・Firebase接続先に事前接続しておくことで読み込みを高速化
     (style.css内の@importより、こちらの方が先に接続処理が始まるため速い) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Shippori+Mincho:wght@700;800&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body class="overlay-page">

  <!--
    #stage が941px固定のオーバーレイ本体。
    背景は透明なので、PRISM LIVEのブラウザソースとして
    ゲーム映像の上に重ねて使う。
  -->
  <div id="stage">

    <!-- ① ヘッダー: タイトル(左) + 時計(右) -->
    <div class="header-bar">
      <div class="title-bar glass-panel">
        <span id="title" class="gold-text">読み込み中...</span>
      </div>
      <div class="clock-bar glass-panel">
        <span id="clock">--:--:--</span>
      </div>
    </div>

    <!-- ③ ギフト一覧: ページ数分の要素をoverlay.jsが動的に生成し、
         表示/非表示の切替だけでクロスフェードさせる(作り直さない) -->
    <div class="gift-area" id="giftArea"></div>

    <!-- ④ 残りキル数(下部中央、大きく強調) -->
    <div class="kill-footer glass-panel">
      <span class="kill-label" id="killLabel">残り</span>
      <span class="kill-value gold-text" id="killCount">0</span>
      <span class="kill-unit" id="killUnit">Kill</span>
    </div>

    <!-- 接続エラー時のみ表示される小さなステータス表示 -->
    <div id="status" class="status-badge">接続できません</div>

    <!-- ギフト受信イベント演出(Cloudflare Worker経由でギフトが届いた時だけ表示) -->
    <div class="event-banner" id="eventBanner">
      <div class="event-gift-name" id="eventGiftName"></div>
      <div class="event-kill-roulette" id="eventKillRoulette"></div>
      <div class="event-effect-roulette" id="eventEffectRoulette"></div>
      <div class="event-announce" id="eventAnnounce"></div>
    </div>
  </div>

  <!-- Firebase SDK (compat版。ビルド不要でそのまま使える) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>

  <!-- 表示ロジック本体(ES Modules)。データ管理はcommon.jsに分離済み -->
  <script type="module" src="overlay.js"></script>
</body>
</html>
